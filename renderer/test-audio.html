<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self'; script-src 'self'; media-src 'self'">
  <title>Glyphs — audio test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="screen">
    <div class="audio-harness">
      <div class="harness-hint">type a word  ·  ENTER to play  ·  TAB to cycle voice  ·  BACKSPACE to edit</div>
      <div class="harness-voice">voice: <span id="voice-label">—</span></div>
      <div class="harness-status" id="status-line">&nbsp;</div>
      <div class="harness-input">
        &gt;&nbsp;<span id="input-buffer"></span><span class="cursor" aria-hidden="true"></span>
      </div>
      <div class="harness-history" id="history-list"></div>
    </div>
  </div>

  <!--
    Script load order per PHASE2-PLAN.md §Renderer contract:
      namespace → containment → pointer → manifest → audio → audio-test → boot

    NOTE: audio/manifest.js is GENERATED by tools/tts/generate_clips.py and will
    not exist on disk until the TTS generation gate runs. audio.js degrades gracefully
    when window.Glyphs.audio.manifest is undefined (falls back to primary voice "sulafat",
    ext "wav", no known words). The page loads cleanly without this file; the Electron
    main process will log a net::ERR_FILE_NOT_FOUND for manifest.js which is expected
    pre-gate.
  -->
  <script src="js/namespace.js"></script>
  <script src="js/containment.js"></script>
  <script src="js/pointer.js"></script>
  <script src="audio/manifest.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/audio-test.js"></script>
  <script src="js/boot.js"></script>
</body>
</html>
